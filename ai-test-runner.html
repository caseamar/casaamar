<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Casa Amar AI – Test Runner</title>
<style>
:root{--ink:#20332d;--clay:#bc6245;--paper:#f4f0e7;--ok:#256b45;--bad:#a83b31;--warn:#9a6a16}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Arial,sans-serif}
main{max-width:1180px;margin:auto;padding:28px}
h1{margin:0 0 8px;font-family:Georgia,serif;font-size:2rem}p{line-height:1.5}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}
button,input{font:inherit}button{border:0;border-radius:12px;padding:11px 16px;font-weight:700;cursor:pointer}
.primary{background:var(--clay);color:#fff}.secondary{background:#fff;color:var(--ink);border:1px solid #d6d1c6}
.endpoint{display:flex;gap:8px;align-items:center;flex:1;min-width:280px}.endpoint input{width:100%;padding:11px;border:1px solid #d6d1c6;border-radius:12px}
.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
.metric{background:#fff;border-radius:14px;padding:14px}.metric strong{display:block;font-size:1.6rem}
table{width:100%;border-collapse:separate;border-spacing:0 8px}
th{text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em}
td{background:#fff;padding:12px;vertical-align:top}
td:first-child{border-radius:12px 0 0 12px}td:last-child{border-radius:0 12px 12px 0}
.status{display:inline-block;padding:5px 8px;border-radius:999px;font-size:.72rem;font-weight:800}
.pending{background:#ece8df}.running{background:#fff0ca;color:#795400}.passed{background:#dff2e7;color:var(--ok)}.failed{background:#fae3df;color:var(--bad)}
.response{max-width:460px;white-space:pre-wrap;font-size:.86rem;line-height:1.45}
.details{font-size:.74rem;color:#65716c;margin-top:6px}
@media(max-width:800px){main{padding:16px}.summary{grid-template-columns:1fr 1fr}table,thead,tbody,tr,th,td{display:block}thead{display:none}tr{margin-bottom:12px}td{border-radius:0!important}td:first-child{border-radius:12px 12px 0 0!important}td:last-child{border-radius:0 0 12px 12px!important}}
</style>
</head>
<body>
<main>
<h1>Casa Amar AI – regressionstest</h1>
<p>Kør testene efter ændringer i AI, policy, intents eller vidensbase. Testværktøjet bruger den valgte <code>/api/chat</code>-adresse.</p>
<div class="toolbar">
  <div class="endpoint"><input id="endpoint" value="https://casaamarv2.pages.dev/api/chat" aria-label="API endpoint"></div>
  <button class="primary" id="runAll">Kør alle tests</button>
  <button class="secondary" id="reset">Nulstil</button>
</div>
<div class="summary">
  <div class="metric"><span>I alt</span><strong id="total">0</strong></div>
  <div class="metric"><span>Bestået</span><strong id="passed">0</strong></div>
  <div class="metric"><span>Fejlet</span><strong id="failed">0</strong></div>
  <div class="metric"><span>Afventer</span><strong id="pending">0</strong></div>
</div>
<table>
<thead><tr><th>ID</th><th>Spørgsmål</th><th>Status</th><th>Svar og kontrol</th></tr></thead>
<tbody id="tests"></tbody>
</table>
</main>
<script>
let suite={tests:[]};
const tbody=document.querySelector('#tests');
const stats={total:document.querySelector('#total'),passed:document.querySelector('#passed'),failed:document.querySelector('#failed'),pending:document.querySelector('#pending')};

function sentenceCount(text){return (String(text).match(/[.!?]+(?:\s|$)/g)||[]).length||1}
function normalise(text){return String(text||'').toLocaleLowerCase('da')}
function evaluate(test,data){
  const text=normalise(data.answer);
  const checks=[];
  checks.push({name:'intent',ok:!test.expected_intent||data.intent===test.expected_intent,actual:data.intent});
  checks.push({name:'needsHuman',ok:data.needsHuman===test.expected_needs_human,actual:data.needsHuman});
  if(test.must_include_any?.length){
    checks.push({name:'skal indeholde mindst ét',ok:test.must_include_any.some(v=>text.includes(normalise(v))),actual:test.must_include_any.join(', ')});
  }
  if(test.must_not_include_any?.length){
    checks.push({name:'må ikke indeholde',ok:!test.must_not_include_any.some(v=>text.includes(normalise(v))),actual:test.must_not_include_any.join(', ')});
  }
  if(test.max_sentences){
    checks.push({name:'maks. sætninger',ok:sentenceCount(data.answer)<=test.max_sentences,actual:sentenceCount(data.answer)});
  }
  return {ok:checks.every(c=>c.ok),checks};
}
function render(){
  tbody.innerHTML='';
  suite.tests.forEach(test=>{
    const tr=document.createElement('tr');
    const result=test.result;
    const status=result?.running?'running':result?(result.ok?'passed':'failed'):'pending';
    tr.innerHTML=`<td><strong>${test.id}</strong><div class="details">${test.category}</div></td>
      <td>${test.question}<div class="details">${test.notes||''}</div></td>
      <td><span class="status ${status}">${status==='passed'?'Bestået':status==='failed'?'Fejlet':status==='running'?'Kører':'Afventer'}</span></td>
      <td><div class="response">${result?.answer||''}</div><div class="details">${result?.checks?result.checks.map(c=>`${c.ok?'✓':'✗'} ${c.name}: ${c.actual}`).join('<br>'):''}</div></td>`;
    tbody.appendChild(tr);
  });
  const complete=suite.tests.filter(t=>t.result&&!t.result.running);
  stats.total.textContent=suite.tests.length;
  stats.passed.textContent=complete.filter(t=>t.result.ok).length;
  stats.failed.textContent=complete.filter(t=>!t.result.ok).length;
  stats.pending.textContent=suite.tests.length-complete.length;
}
async function runTest(test){
  test.result={running:true};render();
  try{
    let response;
    let data;
    for(let attempt=1;attempt<=3;attempt++){
      response=await fetch(document.querySelector('#endpoint').value,{
        method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({question:test.question,messages:[]})
      });
      data=await response.json();
      if(response.ok) break;
      const rateLimited=response.status===429 || /for mange spørgsmål|rate limit/i.test(data.detail||data.error||'');
      if(!rateLimited || attempt===3) throw new Error(data.detail||data.error||`HTTP ${response.status}`);
      await new Promise(r=>setTimeout(r,attempt*1800));
    }
    const evaluation=evaluate(test,data);
    test.result={...evaluation,answer:data.answer};
  }catch(error){
    test.result={ok:false,answer:`FEJL: ${error.message}`,checks:[]};
  }
  render();
}
document.querySelector('#runAll').addEventListener('click',async()=>{
  document.querySelector('#runAll').disabled=true;
  for(const test of suite.tests){await runTest(test);await new Promise(r=>setTimeout(r,900))}
  document.querySelector('#runAll').disabled=false;
});
document.querySelector('#reset').addEventListener('click',()=>{suite.tests.forEach(t=>delete t.result);render()});
fetch('ai-regression-tests.json').then(r=>r.json()).then(data=>{suite=data;render()}).catch(e=>{tbody.innerHTML=`<tr><td colspan="4">Kunne ikke indlæse testfilen: ${e.message}</td></tr>`});
</script>
</body>
</html>
