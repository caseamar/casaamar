<!doctype html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Casa Amar Page Preview</title><style>
body{margin:0;font-family:Arial,sans-serif;color:#20332d;background:#f4f0e7}.hero,section{max-width:1100px;margin:auto;padding:70px 24px}.hero{min-height:70vh;display:flex;flex-direction:column;justify-content:end;background:linear-gradient(135deg,#d9c4a9,#789387);color:white;max-width:none}.hero>div{max-width:800px;margin:auto;width:100%}h1,h2{font-family:Georgia,serif}h1{font-size:clamp(2.7rem,7vw,6rem);margin:0}.body{font-size:1.1rem;line-height:1.6;max-width:720px}.placeholder{height:240px;background:#d8d2c7;border-radius:16px;display:grid;place-items:center;color:#68746f;margin-top:20px}.cta{display:inline-block;margin-top:16px;padding:12px 18px;background:#bc6245;color:white;border-radius:999px}.section:nth-child(even){background:white;max-width:none}.section:nth-child(even)>div{max-width:1100px;margin:auto}</style></head>
<body><div id="page"></div><script>
Promise.all([fetch('/page-blueprint.json').then(r=>r.json()),fetch('/website-content.json').then(r=>r.json())]).then(([blueprint,content])=>{
 let local;try{local=JSON.parse(localStorage.getItem('casaWebsiteContentDraft')||'null')}catch{};if(local?.sections)content=local;
 const definitions=blueprint.pages[0].sections;
 document.querySelector('#page').innerHTML=definitions.map((def,i)=>{
  const stored=content.sections.find(x=>x.id===def.id)||{},copy=stored.draft||stored.live||{};
  const inner=`<div><div style="text-transform:uppercase;letter-spacing:.12em;font-size:.7rem">${def.purpose}</div><h${i===0?'1':'2'}>${copy.headline||def.id}</h${i===0?'1':'2'}><p class="body">${copy.body||'Teksten er endnu ikke genereret.'}</p><div class="placeholder">${(def.image_slots||[]).reduce((n,x)=>n+x.count,0)} planlagte billeder</div>${copy.cta_label?`<span class="cta">${copy.cta_label}</span>`:''}</div>`;
  return i===0?`<header class="hero">${inner}</header>`:`<section class="section">${inner}</section>`;
 }).join('');
});
</script></body></html>
